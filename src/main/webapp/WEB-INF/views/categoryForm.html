<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카테고리 등록 - Product Management</title>
  <style>
    body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #333; }
    h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; }
    input[type="text"] { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1em; box-sizing: border-box; }
    .error { color: #e74c3c; font-size: 0.9em; margin-top: 4px; display: block; }
    .btn { display: inline-block; padding: 8px 16px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; }
    .btn:hover { background: #357abd; }
    .btn-cancel { background: #6c757d; text-decoration: none; margin-left: 8px; }
    .btn-cancel:hover { background: #5a6268; }
    .footer { margin-top: 40px; padding: 12px 16px; background: #f0f0f0; border-top: 1px solid #ccc; font-size: 0.9em; color: #555; }
  </style>
</head>
<body>

<h1>카테고리 등록</h1>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
  <div class="form-group">
    <label for="name">카테고리 이름</label>
    <input type="text" th:field="*{name}" placeholder="카테고리 이름을 입력하세요"/>
    <span class="error" th:errors="*{name}"></span>
  </div>
  <button type="submit" class="btn">등록</button>
  <a class="btn btn-cancel" th:href="@{/categories}">취소</a>
</form>

<div class="footer">
  <span th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss')}"></span>
  &nbsp;|&nbsp; 학번: 2271483 &nbsp;|&nbsp; 성명: 황필호
</div>

</body>
</html>
